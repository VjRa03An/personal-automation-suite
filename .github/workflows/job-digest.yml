name: Daily Job Digest

on:
  schedule:
    - cron: '0 15 * * 1-5'  # 8am PT, weekdays
  workflow_dispatch:
permissions:
  contents: write

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r gmail-cleanup/requirements.txt

      - name: Run job digest
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          DIGEST_EMAIL: ${{ secrets.DIGEST_EMAIL }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
          GMAIL_CREDENTIALS_JSON: ${{ secrets.GMAIL_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd gmail-cleanup
          python job_digest.py



      - name: Save digest log
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          find . -name "digest_log.json" -exec cp {} digest_log.json \;
          git add digest_log.json
          git diff --staged --quiet || git commit -m "Update digest_log.json [skip ci]"
          git push
